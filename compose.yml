services:
    # auth service
    # Database for the auth service
    auth-service-db:
        image: postgres:17.2-alpine
        ports:
            - "5433:5432"
        env_file:
            - auth-service/.env
        volumes:
            - ./auth-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql # init script
            - auth-data:/var/lib/postgresql/data
        networks:
            - omahtryout-network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U omahTryOut -d auth_service_db"]
            interval: 5s
            timeout: 5s
            retries: 5

    # API for the auth service
    auth-service-api:
        build: ./auth-service
        env_file:
            - auth-service/.env
            - .env
        depends_on:
            auth-service-db:
                condition: service_healthy # Ensure DB is ready
        volumes:
          - ./auth-service/var/log/auth-service:/var/log/auth-service
        networks:
            - omahtryout-network
        healthcheck:
            test: ["CMD-SHELL", "wget --quiet -O /dev/null http://localhost:8081/ping/ || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 3

    redis:
        image: redis:7.4-alpine
        command: ["redis-server", "--appendonly", "yes"]
        ports:
            - "6379:6379"
        volumes:
            - redis-data:/data
        networks:
            - omahtryout-network
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 10

    minio:
        image: minio/minio:latest
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
            MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
        ports:
            - "${MINIO_API_PORT}:9000"
            - "${MINIO_CONSOLE_PORT}:9001"
        volumes:
            - minio-data:/data
        networks:
            - omahtryout-network

    api-gateway:
        build: ./api-gateway
        depends_on:
            auth-service-api:
                condition: service_healthy
            redis:
                condition: service_healthy
            soal-service-api:
                condition: service_started
            tryout-service-api:
                condition: service_started
            minat-bakat-service-api:
                condition: service_started
        environment:
            PORT: ${API_GATEWAY_PORT}
            AUTH_SERVICE_URL: http://auth-service-api:8081
            SOAL_SERVICE_URL: http://soal-service-api:8082
            TRYOUT_SERVICE_URL: http://tryout-service-api:8083
            MINAT_BAKAT_SERVICE_URL: http://minat-bakat-service-api:8084
            CORS_URL: http://localhost:3000,http://127.0.0.1:3000
            REDIS_HOST: redis
            REDIS_PORT: 6379
            REDIS_DB: 0
            REDIS_POOL_SIZE: 10
        ports:
            - "${API_GATEWAY_PORT}:${API_GATEWAY_PORT}"
        networks:
            - omahtryout-network

    # Soal service
    # Database for the soal service
    soal-service-db:
        image: postgres:17.2-alpine
        ports:
            - "5434:5432"
        env_file:
            - soal-service/.env
        volumes:
            - ./soal-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql # init script
            - soal-data:/var/lib/postgresql/data
        networks:
            - omahtryout-network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U omahTryOut -d soal_service_db"]
            interval: 5s
            timeout: 5s
            retries: 5

    # API for the soal service
    soal-service-api:
        build: ./soal-service
        env_file:
            - soal-service/.env
            - .env
        environment:
            INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-omahto-dev-internal-token}
        depends_on:
            soal-service-db:
                condition: service_healthy # Ensure DB is ready
            auth-service-api:
                condition: service_healthy # Ensure Auth service is ready
            minio:
                condition: service_started
        networks:
            - omahtryout-network
        volumes:
          - ./soal-service/var/log/soal-service:/var/log/soal-service

    # Tryout service
    # Database for the tryout service
    tryout-service-db:
        image: postgres:17.2-alpine
        ports:
            - "5435:5432"
        env_file:
            - tryout-service/.env
        volumes:
            - ./tryout-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql # init script
            - tryout-data:/var/lib/postgresql/data
        networks:
            - omahtryout-network
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U omahTryOut -d tryout_service_db"]
            interval: 5s
            timeout: 5s
            retries: 5

    # API for the tryout service
    tryout-service-api:
        build: ./tryout-service
        env_file:
            - tryout-service/.env
            - .env
        environment:
            INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-omahto-dev-internal-token}
        depends_on:
            tryout-service-db:
                condition: service_healthy # Ensure DB is ready
            auth-service-api:
                condition: service_healthy # Ensure Auth service is ready
        networks:
            - omahtryout-network
        volumes:
          - ./tryout-service/var/log/tryout-service:/var/log/tryout-service

    # Minat bakat service
    minat-bakat-service-db:
        image: postgres:17.2-alpine
        ports:
            - "5436:5432"
        env_file:
            - minat-bakat-service/.env
        volumes:
            - ./minat-bakat-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql # init script
            - minat-bakat-data:/var/lib/postgresql/data
        networks:
            - omahtryout-network
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U omahTryOut -d minat-bakat_service_db",
                ]
            interval: 5s
            timeout: 5s
            retries: 5

    # API for the minat bakat service
    minat-bakat-service-api:
        build: ./minat-bakat-service
        env_file:
            - minat-bakat-service/.env
            - .env
        depends_on:
            minat-bakat-service-db:
                condition: service_healthy # Ensure DB is ready
            auth-service-api:
                condition: service_healthy # Ensure Auth service is ready
        networks:
            - omahtryout-network
        volumes:
          - ./minat-bakat-service/var/log/minat-bakat-service:/var/log/minat-bakat-service

networks:
    omahtryout-network:
        name: omahtryout-network

# volumes for persistent data
volumes:
    auth-data:
    soal-data:
    tryout-data:
    minat-bakat-data:
    redis-data:
    minio-data:
